    <style>

            backdrop-filter: blur(10px);

<body class="bg-neutral-50 text-neutral-800 font-sans antialiased flex flex-col min-h-screen">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 glass-card shadow-sm">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold font-mono gradient-text">TechPortfolio</a>
            <div class="hidden md:flex gap-8 items-center">
                <a href="index.html" class="text-neutral-700 hover:text-accent-blue transition font-medium">Главная</a>
                <a href="services.html" class="text-neutral-700 hover:text-accent-blue transition font-medium">Услуги</a>
                <a href="blog.html" class="text-neutral-700 hover:text-accent-blue transition font-medium">Блог</a>
                <a href="about.html" class="text-accent-blue font-medium">Обо мне</a>
                <a href="contacts.html" class="text-neutral-700 hover:text-accent-blue transition font-medium">Контакты</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow pt-32 pb-20">
        <div class="container mx-auto px-6">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-4xl font-bold text-center mb-12 gradient-text">Обо мне</h1>
                
                <div class="glass-card p-8 rounded-2xl shadow-lg space-y-8" id="about-content">
                    <!-- Контент загружается через JavaScript -->
                    <div class="text-center text-neutral-400">Загрузка...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-neutral-900 text-white py-12">
        <div class="container mx-auto px-6">
            <div class="grid md:grid-cols-3 gap-8 mb-8">
                <div>
                    <h3 class="text-2xl font-bold font-mono mb-4 gradient-text">TechPortfolio</h3>
                    <p class="text-neutral-400">Профессиональная разработка цифровых продуктов</p>
                </div>
                <div>
                    <h4 class="text-lg font-semibold mb-4">Контакты</h4>
                    <ul class="space-y-2 text-neutral-400" id="footer-contacts">
                        <li>📧 contact@techportfolio.ru</li>
                        <li>📱 +7 (999) 123-45-67</li>
                        <li>📍 Москва, Россия</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-semibold mb-4">Социальные сети</h4>
                    <div class="flex gap-4" id="footer-socials">
                        <a href="#" class="w-10 h-10 bg-neutral-800 rounded-lg flex items-center justify-center hover:bg-accent-blue transition">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg>
                        </a>
                        <a href="#" class="w-10 h-10 bg-neutral-800 rounded-lg flex items-center justify-center hover:bg-accent-blue transition">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                        </a>
                        <a href="#" class="w-10 h-10 bg-neutral-800 rounded-lg flex items-center justify-center hover:bg-accent-blue transition">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        </a>
                    </div>
                </div>
            </div>
            <div class="border-t border-neutral-800 pt-8 text-center text-neutral-400">
                <p>&copy; 2024 TechPortfolio. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script>
        // Загрузка данных "Обо мне"
        async function loadAboutData() {
            try {
                const response = await fetch('api/about.php');
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('about-content').innerHTML = `<div class="text-center text-red-500">Ошибка: ${data.error}</div>`;
                    return;
                }
                
                const techStack = data.tech_stack ? data.tech_stack.split(',').map(t => t.trim()) : [];
                const timeline = data.timeline ? JSON.parse(data.timeline) : [];
                
                let html = `
                    <div class="prose prose-lg max-w-none">
                        <p class="text-neutral-600 text-lg leading-relaxed">${data.bio_ru || ''}</p>
                        
                        <h3 class="text-2xl font-bold mt-8 mb-4">Мой стек технологий</h3>
                        <div class="flex flex-wrap gap-2">
                            ${techStack.map(tech => `
                                <span class="px-3 py-1 bg-accent-blue/10 text-accent-blue rounded-full text-sm font-medium">${tech}</span>
                            `).join('')}
                        </div>
                        
                        <h3 class="text-2xl font-bold mt-8 mb-4">Опыт работы</h3>
                        <div class="space-y-4">
                            ${timeline.map(item => `
                                <div class="border-l-2 border-accent-blue pl-4 pb-4">
                                    <div class="text-sm text-accent-blue font-semibold">${item.year}</div>
                                    <div class="font-semibold text-neutral-800">${item.title}</div>
                                    <div class="text-neutral-600">${item.company}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                document.getElementById('about-content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading about data:', error);
                document.getElementById('about-content').innerHTML = '<div class="text-center text-red-500">Ошибка загрузки данных</div>';
            }
        }
        
        // Загрузка контактов в футер
        async function loadFooterContacts() {
            try {
                const response = await fetch('api/settings.php');
                const settings = await response.json();
                
                if (settings.email || settings.phone || settings.address) {
                    const contactsHtml = `
                        ${settings.email ? `<li>📧 ${settings.email}</li>` : ''}
                        ${settings.phone ? `<li>📱 ${settings.phone}</li>` : ''}
                        ${settings.address ? `<li>📍 ${settings.address}</li>` : ''}
                    `;
                    document.getElementById('footer-contacts').innerHTML = contactsHtml;
                }
                
                if (settings.vk_url || settings.telegram_url || settings.max_url) {
                    const socialsHtml = `
                        ${settings.vk_url ? `<a href="${settings.vk_url}" target="_blank" class="w-10 h-10 bg-neutral-800 rounded-lg flex items-center justify-center hover:bg-blue-600 transition" title="ВКонтакте">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.785 16.231s.285-.031.431-.193c.133-.148.129-.427.129-.427s-.02-1.305.585-1.496c.598-.188 1.365 1.255 2.18 1.811.615.423 1.079.33 1.079.33l2.163-.03s1.134-.071.594-.965c-.044-.073-.315-.654-1.62-1.844-1.367-1.246-1.185-1.045.464-3.218.999-1.322 1.399-2.133 1.274-2.483-.119-.333-.854-.245-.854-.245l-2.441.015s-.181-.025-.315.056c-.132.08-.217.265-.217.265s-.389 1.033-.909 1.911c-1.098 1.858-1.535 1.955-1.713 1.844-.415-.268-.312-1.076-.312-1.649 0-1.79.272-2.535-.531-2.726-.268-.064-.463-.106-1.149-.114-.879-.009-1.62.003-2.042.208-.281.137-.498.441-.366.459.163.022.532.1.727.363.253.341.244 1.107.244 1.107s.146 2.175-.34 2.447c-.334.188-.79-.197-1.775-1.882-.504-.863-.885-1.816-.885-1.816s-.073-.18-.203-.276c-.158-.118-.379-.156-.379-.156l-2.316.015s-.348.01-.476.161c-.115.136-.009.418-.009.418s1.815 4.239 3.878 6.375c1.884 1.954 4.026 1.826 4.026 1.826h.971z"/></svg>
                        </a>` : ''}
                        ${settings.telegram_url ? `<a href="${settings.telegram_url}" target="_blank" class="w-10 h-10 bg-neutral-800 rounded-lg flex items-center justify-center hover:bg-blue-500 transition" title="Telegram">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                        </a>` : ''}
                        ${settings.max_url ? `<a href="${settings.max_url}" target="_blank" class="w-10 h-10 bg-neutral-800 rounded-lg flex items-center justify-center hover:bg-purple-600 transition" title="Max">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 2c5.514 0 10 4.486 10 10s-4.486 10-10 10S2 17.514 2 12 6.486 2 12 2zm0 4c-3.314 0-6 2.686-6 6s2.686 6 6 6 6-2.686 6-6-2.686-6-6-6zm0 2c2.21 0 4 1.79 4 4s-1.79 4-4 4-4-1.79-4-4 1.79-4 4-4z"/></svg>
                        </a>` : ''}
                    `;
                    document.getElementById('footer-socials').innerHTML = socialsHtml;
                }
                
            } catch (error) {
                console.error('Error loading footer contacts:', error);
            }
        }
        
        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            loadAboutData();
            loadFooterContacts();
        });
    </script>
</body>
</html>
