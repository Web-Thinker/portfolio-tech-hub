<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обо мне - TechPortfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: { DEFAULT: '#FFFFFF', muted: '#F8FAFC' },
                        accent: { blue: '#2563EB', orange: '#F97316' },
                        neutral: { primary: '#1E293B', secondary: '#64748B', border: '#E2E8F0' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card { @apply bg-white/80 backdrop-blur-md border border-neutral-border/50 rounded-xl shadow-lg; }
    </style>
</head>
<body class="bg-bg text-neutral-primary font-sans antialiased">
    <header class="fixed top-0 left-0 right-0 z-50 glass-card border-b border-neutral-border/50">
        <nav class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold font-mono text-accent-blue">TechPortfolio</a>
            <div class="hidden md:flex gap-6 items-center">
                <a href="index.html" class="text-neutral-secondary hover:text-accent-blue transition">Главная</a>
                <a href="services.html" class="text-neutral-secondary hover:text-accent-blue transition">Услуги</a>
                <a href="blog.html" class="text-neutral-secondary hover:text-accent-blue transition">Блог</a>
                <a href="about.html" class="text-accent-blue font-medium">Обо мне</a>
                <a href="contacts.html" class="text-neutral-secondary hover:text-accent-blue transition">Контакты</a>
            </div>
        </nav>
    </header>

    <section class="pt-32 pb-20 container mx-auto px-4">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-4xl font-bold mb-8 text-center">Обо мне</h1>
            <div class="glass-card p-8 space-y-6">
                <div class="prose prose-lg max-w-none">
                    <p class="text-neutral-secondary text-lg">
                        Привет! Я IT-специалист с многолетним опытом в разработке программного обеспечения, 
                        дизайне и системном администрировании.
                    </p>
                    <h3 class="text-2xl font-semibold mt-6 mb-4">Мой стек технологий</h3>
                    <div class="flex flex-wrap gap-2" id="tech-stack"></div>
                    
                    <h3 class="text-2xl font-semibold mt-6 mb-4">Опыт работы</h3>
                    <div class="space-y-4" id="timeline"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadTechStack();
            loadTimeline();
        });
    </script>
</body>
</html>
