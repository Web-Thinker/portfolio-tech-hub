<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPortfolio - Программирование. Дизайн. DevOps.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: { DEFAULT: '#FFFFFF', muted: '#F8FAFC', dark: '#0F172A' },
                        accent: { blue: '#2563EB', orange: '#F97316' },
                        neutral: { primary: '#1E293B', secondary: '#64748B', border: '#E2E8F0' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card { @apply bg-white/80 backdrop-blur-md border border-neutral-border/50 rounded-xl shadow-lg; }
        .btn-primary { @apply bg-accent-blue hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg transition-all duration-200; }
        .btn-secondary { @apply bg-neutral-border/50 hover:bg-accent-orange/20 hover:text-accent-orange text-neutral-secondary font-medium px-5 py-2.5 rounded-lg transition-all duration-200; }
    </style>
</head>
<body class="bg-bg text-neutral-primary font-sans antialiased">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 glass-card border-b border-neutral-border/50">
        <nav class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold font-mono text-accent-blue">TechPortfolio</a>
            <div class="hidden md:flex gap-6 items-center">
                <a href="index.html" class="text-neutral-secondary hover:text-accent-blue transition">Главная</a>
                <a href="services.html" class="text-neutral-secondary hover:text-accent-blue transition">Услуги</a>
                <a href="blog.html" class="text-neutral-secondary hover:text-accent-blue transition">Блог</a>
                <a href="about.html" class="text-neutral-secondary hover:text-accent-blue transition">Обо мне</a>
                <a href="contacts.html" class="text-neutral-secondary hover:text-accent-blue transition">Контакты</a>
                <button onclick="openModal()" class="btn-primary">Связаться со мной</button>
                <button onclick="toggleLang()" class="px-3 py-1 rounded border border-neutral-border hover:bg-neutral-border/30">EN</button>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="pt-32 pb-20 container mx-auto px-4 text-center">
        <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-6">
            <span class="text-accent-blue">Программирование.</span>
            <span class="text-accent-blue">Дизайн.</span>
            <span class="text-accent-blue">DevOps.</span>
        </h1>
        <p class="text-neutral-secondary text-lg max-w-2xl mx-auto mb-10">
            Полный цикл разработки цифровых продуктов: от идеи до запуска и поддержки
        </p>
        <div class="flex gap-4 justify-center">
            <a href="services.html" class="btn-primary px-8 py-3 text-lg">Смотреть услуги</a>
            <a href="contacts.html" class="btn-secondary px-8 py-3 text-lg">Контакты</a>
        </div>
    </section>

    <!-- Services Preview -->
    <section class="py-20 bg-bg-muted">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold text-center mb-12">Мои услуги</h2>
            <div class="grid md:grid-cols-3 gap-6" id="services-grid">
                <!-- Services loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Contact Modal -->
    <div id="contactModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <form id="contactForm" class="glass-card w-full max-w-md p-6 space-y-4 relative" onsubmit="handleSubmit(event)">
                <h3 class="text-xl font-semibold">Связаться со мной</h3>
                <input type="hidden" name="honeypot" class="hidden" autocomplete="off">
                <div>
                    <input type="text" name="fullName" required minlength="2" maxlength="50" placeholder="ФИО" 
                           class="w-full p-3 rounded bg-transparent border border-neutral-border focus:border-accent-blue outline-none">
                </div>
                <div>
                    <input type="text" name="contact" required placeholder="Email или Телефон" 
                           class="w-full p-3 rounded bg-transparent border border-neutral-border focus:border-accent-blue outline-none">
                </div>
                <div>
                    <textarea name="message" required minlength="10" maxlength="1000" rows="4" placeholder="Сообщение" 
                              class="w-full p-3 rounded bg-transparent border border-neutral-border focus:border-accent-blue outline-none resize-none"></textarea>
                </div>
                <div class="h-captcha" data-sitekey="10000000-ffff-ffff-ffff-000000000001"></div>
                <button type="submit" class="btn-primary w-full">Отправить заявку</button>
                <button type="button" onclick="closeModal()" class="btn-secondary w-full">Закрыть</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
